name: Build and Release

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        env:
          ELECTRON: 'true'
        run: npm run build:web

      - name: Build Desktop Installer
        env:
          ELECTRON: 'true'
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          ELECTRON_BUILDER_DISABLE_WIN_CODE_SIGNING: 'true'
        run: npx electron-builder --win nsis --publish never

      - name: Create Portable Zip
        run: |
          Compress-Archive -Path 'executaveis\win-unpacked\*' -DestinationPath 'executaveis\GradeInteligente.zip' -Force

      - name: Get Version
        id: get_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $env:GITHUB_ENV

      - name: Generate Hashes
        run: |
          $version = $env:VERSION
          $exePath = "executaveis\Grade-Inteligente-$version-Setup.exe"
          Get-FileHash -Path $exePath, 'executaveis\GradeInteligente.zip' -Algorithm SHA256 | ForEach-Object { $_.Path.Split('\')[-1] + ': ' + $_.Hash } | Out-File 'executaveis\hashes.txt' -Encoding UTF8

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          $version = $env:VERSION
          gh release create "v$version" "executaveis/Grade-Inteligente-$version-Setup.exe" "executaveis/GradeInteligente.zip" "executaveis/hashes.txt" --repo binarymath/GradeInteligenteExecutavel --title "Versão $version" --notes "Release automático gerado via CI" --generate-notes
